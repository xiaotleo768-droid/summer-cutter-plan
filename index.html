<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>暑假任务剪纸条计划</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">咔</div>
      <div>
        <p class="brand-name">咔嚓小队计划板</p>
        <p class="brand-subtitle">写一格，做一格，剪一格</p>
      </div>
    </div>

    <nav class="mode-tabs" aria-label="页面模式">
      <button class="tab-button is-active" type="button" data-mode="edit">编辑计划</button>
      <button class="tab-button" type="button" data-mode="print">打印预览</button>
    </nav>

    <div class="header-actions">
      <button class="ghost-button" type="button" id="resetButton">恢复示例</button>
      <button class="primary-button" type="button" id="printButton">导出 PDF</button>
    </div>
  </header>

  <main class="app-main">
    <section class="edit-view" id="editView" aria-labelledby="editTitle">
      <aside class="plan-panel" aria-label="计划信息">
        <div class="panel-heading">
          <p class="mini-label">今日挑战</p>
          <h1 id="editTitle">今天剪掉几格？</h1>
          <p class="progress-pill" id="overallProgress">0/0 已完成</p>
        </div>

        <div class="helper-card">
          <strong>小提示</strong>
          <span>把大任务拆成小纸条，每完成一项就给自己一个“咔嚓”。</span>
        </div>

        <div class="field-stack">
          <label>
            <span>计划标题</span>
            <input id="titleInput" maxlength="24" autocomplete="off">
          </label>
          <label>
            <span>鼓励语</span>
            <input id="subtitleInput" maxlength="36" autocomplete="off">
          </label>
          <label>
            <span>署名</span>
            <input id="studentInput" maxlength="18" autocomplete="off">
          </label>
          <label>
            <span>小口号</span>
            <input id="mottoInput" maxlength="28" autocomplete="off">
          </label>
        </div>

        <div class="panel-actions">
          <button class="secondary-button" type="button" id="addColumnButton">添加栏目</button>
          <button class="ghost-button" type="button" id="copyDataButton">复制数据</button>
        </div>
      </aside>

      <section class="board-shell" aria-label="任务剪纸条">
        <div class="board-toolbar">
          <div>
            <p class="toolbar-label">我的彩色任务条</p>
            <p class="toolbar-note" id="taskCountText">每列写完一格，就可以剪掉一格</p>
          </div>
          <button class="primary-button" type="button" id="previewButton">查看打印预览</button>
        </div>
        <div class="task-board" id="taskBoard"></div>
      </section>
    </section>

    <section class="print-view" id="printView" aria-labelledby="printTitle" hidden>
      <div class="print-toolbar">
        <div>
          <h2 id="printTitle">打印预览</h2>
          <p>建议使用横向打印，缩放选择 100%。</p>
        </div>
        <label class="switch">
          <input type="checkbox" id="inkSaverToggle">
          <span>省色模式</span>
        </label>
        <button class="secondary-button" type="button" id="backToEditButton">继续编辑</button>
        <button class="primary-button" type="button" id="printPreviewButton">打印 / 保存 PDF</button>
      </div>

      <div class="preview-stage">
        <article class="print-sheet" id="printSheet"></article>
      </div>
    </section>
  </main>

  <dialog id="taskDialog" class="task-dialog">
    <form method="dialog" id="taskForm">
      <div class="dialog-head">
        <p>TASK</p>
        <button class="icon-button" value="cancel" aria-label="关闭" type="submit">×</button>
      </div>
      <h2 id="taskDialogTitle">添加任务</h2>
      <label>
        <span>任务内容</span>
        <input id="taskInput" placeholder="例如：背诵《观潮》" maxlength="30" autocomplete="off">
      </label>
      <menu>
        <button class="ghost-button" value="cancel" type="submit">取消</button>
        <button class="primary-button" id="taskSubmitButton" value="default" type="submit">添加</button>
      </menu>
    </form>
  </dialog>

  <dialog id="columnDialog" class="task-dialog">
    <form method="dialog" id="columnForm">
      <div class="dialog-head">
        <p>COLUMN</p>
        <button class="icon-button" value="cancel" aria-label="关闭" type="submit">×</button>
      </div>
      <h2>添加栏目</h2>
      <label>
        <span>栏目名称</span>
        <input id="columnTitleInput" placeholder="例如：运动" maxlength="12" autocomplete="off">
      </label>
      <label>
        <span>短标签</span>
        <input id="columnShortInput" placeholder="例如：动" maxlength="2" autocomplete="off">
      </label>
      <label>
        <span>颜色</span>
        <select id="columnColorInput">
          <option value="yellow">柠檬黄</option>
          <option value="green">薄荷绿</option>
          <option value="pink">桃粉色</option>
          <option value="blue">天空蓝</option>
          <option value="orange">西瓜橙</option>
        </select>
      </label>
      <menu>
        <button class="ghost-button" value="cancel" type="submit">取消</button>
        <button class="primary-button" value="default" type="submit">添加</button>
      </menu>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="logic.js"></script>
  <script src="app.js"></script>
</body>
</html>
